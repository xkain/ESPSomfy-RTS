; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



; platformio.ini - ESPSomfy (CONFIGURATION DE CRISE ANTI-BOOTLOOP)
[env:esp32dev]
platform = espressif32@6.8.1
board = esp32dev
framework = arduino
lib_deps =
    bblanchon/ArduinoJson @ 6.21.5
    knolleary/PubSubClient @ 2.8.0
    lsatan/SmartRC-CC1101-Driver-Lib @ 2.5.7
    esp32async/ESPAsyncWebServer @ 3.6.0  ; Version stable et très proche de ta 3.9.x
    esp32async/AsyncTCP @ 3.3.2            ; Compagnon idéal pour ESPAsync 3.6+
    links2004/WebSockets @ 2.4.1

extra_scripts = 
	pre:prepare_assets.py
board_build.filesystem = littlefs
board_build.partitions = default.csv
; board_build.partitions = partitions_custom.csv

upload_port = /dev/ttyUSB1
monitor_port = /dev/ttyUSB1
monitor_speed = 115200

; --- CONFIGURATION STABILISÉE ---
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; Suppression du flag problématique et ajout d'optimisations de RAM
build_flags = 
    -D CORE_DEBUG_LEVEL=0             ; Désactive les logs de debug pour gagner de la Flash/RAM


















