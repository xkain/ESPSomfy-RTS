name: ESPSomfy-RTS Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  release:
    types: [published]

jobs:
  # =======================================================================
  # JOB 1 : Génération du LittleFS unique (Compiles pour Dev ET Release)
  # =======================================================================
  littlefs:
    permissions: write-all
    name: LittleFS Image
    runs-on: ubuntu-latest

    steps:
      - name: Get Release info
        if: github.event_name == 'release'
        id: get_release
        uses: bruceadams/get-release@v1.3.2
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build LittleFS image (générique via esp32dev)
        run: pio run -e esp32dev -t buildfs

      - name: Rename LittleFS to Standard Name
        run: cp .pio/build/esp32dev/littlefs.bin SomfyController.littlefs.bin

      # Sauvegarde temporaire du LittleFS pour le job suivant (firmwares)
      - name: Upload LittleFS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LittleFS
          path: SomfyController.littlefs.bin
          retention-days: 5

      # Upload du LittleFS UNIQUE sur la page de la Release
      - name: Upload LittleFS to Release
        if: github.event_name == 'release'
        uses: shogo82148/actions-upload-release-asset@v1.7.5
        with:
          github_token: ${{ github.token }}
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_name: SomfyController.littlefs.bin
          asset_path: SomfyController.littlefs.bin
          overwrite: true

  # =======================================================================
  # JOB 2 : Compilation de chaque carte, Onboard fusionné et Uploads
  # =======================================================================
  arduino:
    permissions: write-all
    name: ${{ matrix.name }}
    needs: [littlefs]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - env: esp32dev
            name: ESP32
            chip: ESP32
            addr_bootloader: "0x1000"
            fwname: SomfyController.ino.esp32.bin
            obname: SomfyController.onboard.esp32.bin
          - env: esp32wrover
            name: ESP32-Wrover
            chip: ESP32
            addr_bootloader: "0x1000"
            fwname: SomfyController.ino.esp32wrover.bin
            obname: SomfyController.onboard.esp32wrover.bin
          - env: esp32c3
            name: ESP32C3
            chip: ESP32-C3
            addr_bootloader: "0x0"
            fwname: SomfyController.ino.esp32c3.bin
            obname: SomfyController.onboard.esp32c3.bin
          - env: esp32s2
            name: ESP32S2
            chip: ESP32-S2
            addr_bootloader: "0x1000"
            fwname: SomfyController.ino.esp32s2.bin
            obname: SomfyController.onboard.esp32s2.bin

          # VERSION ESP32-S3 (4MB - Universelle)
          - env: esp32s3_4mb
            name: ESP32S3_4MB
            chip: ESP32-S3
            addr_bootloader: "0x0"
            fwname: SomfyController.ino.esp32s3_4mb.bin
            obname: SomfyController.onboard.esp32s3_4mb.bin

          # VERSION ESP32-S3 (8MB - Spécifique)
          - env: esp32s3_8mb
            name: ESP32S3_8MB
            chip: ESP32-S3
            addr_bootloader: "0x0"
            fwname: SomfyController.ino.esp32s3_8mb.bin
            obname: SomfyController.onboard.esp32s3_8mb.bin

    steps:
      - name: Get Release info
        if: github.event_name == 'release'
        id: get_release
        uses: bruceadams/get-release@v1.3.2
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check out code
        uses: actions/checkout@v4

      # Récupération du LittleFS généré au Job 1
      - name: Get LittleFS
        uses: actions/download-artifact@v4
        with:
          name: LittleFS

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO and esptool
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}

      # Création de l'image de fusion onboard
      - name: ${{ matrix.name }} Image
        run: |
          python -m esptool --chip ${{ matrix.chip }} \
            merge-bin -o .pio/build/${{ matrix.env }}/SomfyController.onboard.bin \
            ${{ matrix.addr_bootloader }} .pio/build/${{ matrix.env }}/bootloader.bin \
            0x8000 .pio/build/${{ matrix.env }}/partitions.bin \
            0x10000 .pio/build/${{ matrix.env }}/firmware.bin \
            0x290000 SomfyController.littlefs.bin

      # Compression de l'image onboard avec son nom d'archive propre
      - name: Compress onboard image
        run: zip -j .pio/build/${{ matrix.env }}/${{ matrix.obname }}.zip .pio/build/${{ matrix.env }}/SomfyController.onboard.bin

      # CAS 1 : Si c'est un PUSH de dev
      - name: Upload ${{ matrix.name }} (Dev Artifact)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/bootloader.bin
            .pio/build/${{ matrix.env }}/partitions.bin
            .pio/build/${{ matrix.env }}/SomfyController.onboard.bin
          retention-days: 5

      # CAS 2 : Si c'est une RELEASE (Firmware applicatif)
      - name: Upload firmware to Release
        if: github.event_name == 'release'
        uses: shogo82148/actions-upload-release-asset@v1.7.5
        with:
          github_token: ${{ github.token }}
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_name: ${{ matrix.fwname }}
          asset_path: .pio/build/${{ matrix.env }}/firmware.bin
          overwrite: true

      # CAS 2 suite : Si c'est une RELEASE (Image zip d'usine)
      - name: Upload onboard image to Release
        if: github.event_name == 'release'
        uses: shogo82148/actions-upload-release-asset@v1.7.5
        with:
          github_token: ${{ github.token }}
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_name: ${{ matrix.obname }}.zip
          asset_path: .pio/build/${{ matrix.env }}/${{ matrix.obname }}.zip
          overwrite: true
          asset_content_type: application/zip
